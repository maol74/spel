<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spel-Grabbarna: Äventyr med Bokstäver</title>
    <meta name="description" content="Ett roligt och lärorikt spel för barn att lära sig läsa och leka med bokstäver.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="resources/css/style.css">
</head>
<body>
    <div id="app">
        <div id="loading-screen" class="screen">
            <div class="loader-content">
                <h1 class="logo-text">Spel-Grabbarna</h1>
                <div class="spinner"></div>
                <p>Laddar äventyret...</p>
            </div>
        </div>
        <div id="user-select" class="screen hidden"></div>
        <div id="avatar-select" class="screen hidden"></div>
        <div id="difficulty-select" class="screen hidden"></div>
        <div id="main-menu" class="screen hidden"></div>
        <div id="game-stava" class="screen hidden"></div>
        <div id="game-hitta" class="screen hidden"></div>
        <div id="game-adventure" class="screen hidden"></div>
        <div id="math-menu" class="screen hidden"></div>
        <div id="game-math-penguin" class="screen hidden"></div>
        <div id="game-math-feed" class="screen hidden"></div>
        <div id="game-math-dots" class="screen hidden"></div>
        <div id="dots-menu" class="screen hidden"></div>
        <div id="penguin-menu" class="screen hidden"></div>
        <div id="feed-menu" class="screen hidden"></div>
        <div id="spel-menu" class="screen hidden"></div>
        <div id="game-pop" class="screen hidden"></div>
        <div id="game-catch" class="screen hidden"></div>
        <div id="game-race" class="screen hidden"></div>
        <div id="game-whack" class="screen hidden"></div>
        <div id="game-space" class="screen hidden"></div>
        <div id="game-bubble" class="screen hidden"></div>
        <div id="letter-menu" class="screen hidden"></div>
        <div id="word-menu" class="screen hidden"></div>
        <div id="game-memory" class="screen hidden"></div>
        <div id="game-rabbla" class="screen hidden"></div>
        <div id="game-ljuda" class="screen hidden"></div>
        <div id="admin-menu" class="screen hidden"></div>
        <div id="stories" class="screen hidden"></div>
        <div id="password-screen" class="screen hidden"></div>
        <div id="shop" class="screen hidden"></div>
        <div id="profile-screen" class="screen hidden"></div>
        <div id="wheel-screen" class="screen hidden"></div>
        <div id="creator-screen" class="screen hidden"></div>
        
        <!-- New Educational Games -->
        <div id="game-forsta" class="screen hidden"></div>
        <div id="game-vokal" class="screen hidden"></div>
        <div id="game-mala" class="screen hidden"></div>
        <div id="game-rim" class="screen hidden"></div>
        <div id="game-mening" class="screen hidden"></div>
        <div id="game-gomma" class="screen hidden"></div>
        <div id="game-vag" class="screen hidden"></div>
        <div id="game-monster" class="screen hidden"></div>
        <div id="game-klocka" class="screen hidden"></div>
    </div>

    <!-- Core Scripts -->
    <script src="resources/js/config.js"></script>
    <script src="resources/js/app.js"></script>
    
    <!-- Component Scripts -->
    <script src="resources/js/components/UI.js"></script>
    <script src="resources/js/components/StavaOrd.js"></script>
    <script src="resources/js/components/HittaBokstaven.js"></script>
    <script src="resources/js/components/Adventure.js"></script>
    <script src="resources/js/components/GameVag.js"></script>
    <script src="resources/js/components/GameMonster.js"></script>
    <script src="resources/js/components/GameKlocka.js"></script>
    <script src="resources/js/components/MathGames.js"></script>
    <script src="resources/js/components/GamePop.js"></script>
    <script src="resources/js/components/GameCatch.js"></script>
    <script src="resources/js/components/GameRace.js"></script>
    <script src="resources/js/components/GameWhack.js"></script>
    <script src="resources/js/components/GameSpace.js"></script>
    <script src="resources/js/components/GameBubble.js"></script>
    <script src="resources/js/components/GameMemory.js"></script>
    <script src="resources/js/components/GameFirstLetter.js"></script>
    <script src="resources/js/components/GameVokal.js"></script>
    <script src="resources/js/components/GameMala.js"></script>
    <script src="resources/js/components/GameRabbla.js"></script>
    <script src="resources/js/components/GameLjuda.js"></script>
    <script src="resources/js/components/GameMening.js"></script>
    <script src="resources/js/components/GameGomma.js"></script>
    <script src="resources/js/components/GameRim.js"></script>
    <script src="resources/js/components/Admin.js"></script>
    <script src="resources/js/components/Stories.js"></script>
    <script src="resources/js/components/Shop.js"></script>
    <script src="resources/js/components/Profile.js"></script>
    <script src="resources/js/components/Wheel.js"></script>
    <script src="resources/js/components/Creator.js"></script>
</body>
</html>
